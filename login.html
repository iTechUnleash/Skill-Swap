<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | SkillSwap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <section class="auth-page">
    <div class="container">
      <div class="auth-shell">

        <!-- Left: welcome panel -->
        <div class="auth-info-side">
          <div class="auth-info-content">
            <h2>Hello, Friend!</h2>
            <p>Register with your personal details to use all of the site features.</p>
            <a href="signup.html" class="btn auth-btn-ghost">Sign Up</a>
          </div>
        </div>

        <!-- Right: form -->
        <div class="auth-form-side">
          <a href="index.html" class="auth-brand">
            <span class="brand-logo">S</span>
            <span>SkillSwap</span>
          </a>

          <div class="auth-form-wrap">
            <h1 class="auth-title">Sign In</h1>
            <p class="auth-subtitle">use your email and password to continue</p>

            <form id="loginForm" novalidate>
              <div class="input-group-custom">
                <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                <input type="email" id="loginEmail" class="form-control auth-input" placeholder="Email">
              </div>

              <div class="input-group-custom">
                <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="loginPassword" class="form-control auth-input" placeholder="Password">
              </div>

              <div class="forgot-wrap mb-3">
                <a href="#" class="forgot-link">Forgot Your Password?</a>
              </div>

              <div id="loginFeedback" class="auth-feedback"></div>

              <button type="submit" class="btn auth-btn-primary w-100">Sign In</button>
            </form>

            <p class="mobile-switch d-lg-none mt-4">
              Don’t have an account?
              <a href="signup.html">Sign Up</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="login.js"></script>
</body>
</html>
